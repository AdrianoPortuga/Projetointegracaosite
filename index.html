<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codestech Site Template</title>
  <meta name="site-client-slug" content="advocacia-demo">
  <link rel="stylesheet" href="./components/landing/landing.css">
  <link rel="stylesheet" href="./components/forms/form.css">
  <link rel="stylesheet" href="./components/sdr/sdr-widget.css">
</head>
<body>
  <main class="landing-shell">
    <section class="top-bar">
      <span class="pill" id="segment-pill">segment</span>
      <span class="pill pill-muted" id="client-pill">client</span>
      <span class="pill pill-alert" id="mode-pill">LIVE</span>
    </section>

    <section class="hero-card">
      <p class="hero-kicker" id="brand-name">Codestech</p>
      <h1 class="hero-title" id="brand-headline">Template comercial plug-and-play</h1>
      <p class="hero-description" id="brand-description">
        Estrutura base para SDR, formulário, tracking e handoff orientados por configuração.
      </p>
      <a id="primary-cta" class="primary-cta" href="#lead-form-container">Quero atendimento</a>
    </section>

    <section class="content-grid">
      <article class="content-card">
        <h2>Servicos em destaque</h2>
        <ul id="offers-list"></ul>
      </article>

      <article class="content-card">
        <h2>Perguntas frequentes</h2>
        <ul id="faq-list"></ul>
      </article>
    </section>

    <section id="lead-form-container" class="content-card"></section>
  </main>

  <script type="module" src="./scripts/bootstrap.js"></script>
</body>
</html>
